version: "3"
services:
  pihole:
    container_name: pihole
    image: pihole/pihole:2025.11.1
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "67:67/udp" # Only required if you are using Pi-hole as your DHCP server
      - "80:80/tcp"
    networks:
     ph_network:
       ipv4_address: 192.168.1.198
       priority: 1000
     ph_bridge:
       ipv4_address: 192.168.100.2
       priority: 900
    environment:
      TZ: 'Europe/Madrid'
      WEBPASSWORD: password
      DNSMASQ_LISTENING: local
      PIHOLE_DNS_: '192.168.1.199#53'
    # Volumes store your data between container upgrades
    volumes:
      - './volumes/pihole/pihole:/etc/pihole'
      - './volumes/pihole/dnsmasq.d:/etc/dnsmasq.d'
    cap_add:
      - NET_ADMIN # Required if you are using Pi-hole as your DHCP server, else not needed
    restart: unless-stopped
  unbound:
    container_name: unbound
    image: "mvance/unbound:latest"
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    networks: 
     ph_network:
       ipv4_address: 192.168.1.199
    volumes:
      - '/volume3/docker/unbound:/opt/unbound/etc/unbound/'
    restart: unless-stopped


version: "3"
# Instructions: https://www.wundertech.net/how-to-set-up-pi-hole-and-unbound-on-docker/
services:
  unbound:
    container_name: unbound
    image: klutchell/unbound:1.21.1
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    networks: 
     ph_network:
       ipv4_address: 192.168.1.199
    volumes:
      - './volumes/unbound:/opt/unbound/etc/unbound/'
    restart: unless-stopped
networks:
    ph_bridge:
      driver: bridge
      ipam:
        config:
          - subnet: 192.168.100.0/24
            gateway: 192.168.100.1
            ip_range: 192.168.100.2/32
    ph_network:
      name: ph_network
      driver: macvlan
      driver_opts:
        parent: ovs_eth0
      ipam:
        config:
          - subnet: 192.168.1.0/24
            ip_range: 192.168.1.0/24
            gateway: 192.168.1.1