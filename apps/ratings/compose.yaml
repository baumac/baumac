services:
  ratings-backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    ports:
      - "3000:3000"
    command: "node dist/src/cmd/api/main.js"
    env_file:
      - "example.env"
  postgres:
    image: bitnami/postgresql:16.4.0
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 10s
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: 'ratings'

